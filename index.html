<!DOCTYPE html>
<html>
<head>

<title>Undangan</title>
</head>

<body style="background:black;color:white;text-align:center">

<h1>Zilvi & Syamsul</h1>

<a id="waLink" href="#"><button>RSVP</button></a>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2023/03/06/audio_124bfa.mp3">
</audio>

<button onclick="openInvite()">Buka Undangan</button>

<script>
function openInvite(){
  document.getElementById("music").play().catch(()=>{});
}

const params = new URLSearchParams(window.location.search);
const nama = params.get("to");

let pesan = "Saya akan hadir";

if(nama){
  pesan = "Saya " + decodeURIComponent(nama) + " akan hadir";
}

const waURL = "https://wa.me/6281266595366?text=" + encodeURIComponent(pesan);
document.getElementById("waLink").href = waURL;
</script>

</body>
