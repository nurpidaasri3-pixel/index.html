<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#0f0f0f;
  color:white;
  text-align:center;
}

.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)), url('assets/bg.jpg') center/cover;
}

h1 {
  font-family:'Playfair Display';
  font-size:40px;
}

.btn {
  margin-top:20px;
  padding:12px 25px;
  background:gold;
  color:black;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

.section {
  padding:60px 20px;
}

.countdown {
  font-size:24px;
}
</style>
</head>

<body>

<!-- Opening -->
<div class="hero">
  <h1>Zilvi & Syamsul</h1>
  <p>Kepada Yth. Bapak/Ibu/Saudara</p>
  <button class="btn" onclick="buka()">Buka Undangan</button>
</div>

<!-- Konten -->
<div id="content" style="display:none">

<div class="section">
  <h2>Save The Date</h2>
  <p>25 Mei 2026</p>
  <div class="countdown" id="countdown"></div>
</div>

<div class="section">
  <h2>Lokasi</h2>
  <iframe src="https://maps.google.com/maps?q=lokasi&t=&z=13&ie=UTF8&iwloc=&output=embed"
  width="100%" height="250"></iframe>
</div>

<div class="section">
  <h2>RSVP</h2>
if(nama){
  document.getElementById("waLink").href =
  "https://wa.me/6281266595366?text=Assalamu'alaikum,%20saya%20" + 
  encodeURIComponent(nama) + 
  "%20akan%20hadir%20di%20pernikahan%20Zilvi%20&%20Syamsul";
}

</div>

<audio id="musik" src="assets/musik.mp3"></audio>

<script>
function buka(){
  document.querySelector('.hero').style.display='none';
  document.getElementById('content').style.display='block';
  document.getElementById('musik').play();
}

// countdown
var target = new Date("May 25, 2026 09:00:00").getTime();

setInterval(function(){
  var now = new Date().getTime();
  var selisih = target - now;

  var d = Math.floor(selisih/(1000*60*60*24));
  var h = Math.floor((selisih%(1000*60*60*24))/(1000*60*60));
  var m = Math.floor((selisih%(1000*60*60))/(1000*60));
  var s = Math.floor((selisih%(1000*60))/1000);

  document.getElementById("countdown").innerHTML =
    d+" Hari "+h+" Jam "+m+" Menit "+s+" Detik";
},1000);
</script>

</body>
</html>
